// ── 主题色 & 图标 ──────────────────────────────
const THEME = {
  beijing:"#c0392b", tianjin:"#2471a3", shanghai:"#1a5276",
  nanjing:"#1e8449", hangzhou:"#117a65", suzhou:"#76448a",
  shenzhen:"#1f618d", guangzhou:"#b7950b", wuhan:"#884ea0", chengdu:"#ca6f1e",
};
const ICONS = {
  beijing:"🏯", tianjin:"🌉", shanghai:"🗼", nanjing:"🏛️",
  hangzhou:"🌊", suzhou:"🌸", shenzhen:"🌆", guangzhou:"🏙️",
  wuhan:"🌸", chengdu:"🐼",
};
const PALS = ["#c0392b","#1a5276","#1e8449","#76448a","#b7950b","#117a65","#884ea0","#ca6f1e","#2471a3"];
function hash(s){let h=0;for(let c of s)h=(Math.imul(31,h)+c.charCodeAt(0))|0;return Math.abs(h);}
function col(name,id){return id&&THEME[id]?THEME[id]:PALS[hash(name||"x")%PALS.length];}

function Img({id,name,label,h=160,small}){
  const c=col(name||label,id), icon=ICONS[id]||"🏙️", txt=label||name||"";
  const dark=c+"cc";
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${c}"/><stop offset="100%" stop-color="${dark}"/></linearGradient></defs><rect width="800" height="500" fill="url(#g)"/><text x="400" y="220" font-size="60" text-anchor="middle" dominant-baseline="middle">${icon}</text><text x="400" y="310" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="${small?18:22}" font-weight="600" fill="rgba(255,255,255,0.95)" text-anchor="middle">${txt}</text></svg>`;
  return <div style={{height:h,background:dark,overflow:"hidden",borderRadius:0}}><img src={"data:image/svg+xml,"+encodeURIComponent(svg)} alt={txt} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>;
}
function UniImg({name,label,cityId,h=140,small}){
  const c=col(name,cityId), dark=c+"bb", txt=label||name||"";
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500"><defs><linearGradient id="g" x1="0" y1="1" x2="1" y2="0"><stop offset="0%" stop-color="${dark}"/><stop offset="100%" stop-color="${c}"/></linearGradient></defs><rect width="800" height="500" fill="url(#g)"/><text x="400" y="230" font-size="40" text-anchor="middle">🎓</text><text x="400" y="300" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="${small?14:18}" font-weight="600" fill="rgba(255,255,255,0.9)" text-anchor="middle">${txt}</text></svg>`;
  return <div style={{height:h,background:dark,overflow:"hidden"}}><img src={"data:image/svg+xml,"+encodeURIComponent(svg)} alt={txt} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/></div>;
}

// ── 内蒙古分数线组件 ───────────────────────────
function ScoreTable({scores}){
  const groups={"理科/物理类":["理科","物理类"],"文科/历史类":["文科","历史类"]};
  const avail=Object.keys(groups).filter(g=>groups[g].some(t=>(scores||[]).some(s=>s.type===t)));
  const [tab,setTab]=useState(avail[0]||"理科/物理类");
  if(!scores||!scores.length)return null;
  const rows=scores.filter(s=>groups[tab]&&groups[tab].includes(s.type)).sort((a,b)=>b.year-a.year);
  const vals=rows.map(r=>r.score), mn=Math.min(...vals)-5, mx=Math.max(...vals)+5;
  return(
    <div style={{marginBottom:28}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
        <h3 style={{color:"#fff",margin:0,fontSize:17}}>📊 内蒙古历年录取数据</h3>
        <span style={{color:"#555",fontSize:11}}>来源：内蒙古招考院 / 掌上高考</span>
      </div>
      <p style={{color:"#f59e0b",fontSize:11,margin:"0 0 10px"}}>⚠️ "约"字为估算值，以官方公布为准</p>
      {avail.length>1&&<div style={{display:"flex",gap:6,marginBottom:12}}>
        {avail.map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:"4px 14px",background:tab===t?"#6366f1":"#111",border:`1px solid ${tab===t?"#6366f1":"#333"}`,borderRadius:16,color:tab===t?"#fff":"#888",cursor:"pointer",fontSize:12}}>{t}</button>)}
      </div>}
      <div style={{background:"#0c0c1e",border:"1px solid #1a1a30",borderRadius:10,overflow:"hidden"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr style={{background:"#111"}}>
            {["年份","最低分","全省位次","趋势"].map(h=><th key={h} style={{padding:"8px 12px",color:"#666",fontSize:11,fontWeight:600,textAlign:"left",borderBottom:"1px solid #1a1a30"}}>{h}</th>)}
          </tr></thead>
          <tbody>{rows.map((r,i)=>{
            const bw=Math.round(((r.score-mn)/(mx-mn))*100), latest=i===0;
            return <tr key={r.year+r.type} style={{borderBottom:"1px solid #0d0d1f",background:latest?"#6366f108":"transparent"}}>
              <td style={{padding:"9px 12px",color:latest?"#a5b4fc":"#ccc",fontSize:13,fontWeight:latest?700:400}}>
                {r.year}{latest&&<span style={{marginLeft:5,fontSize:9,color:"#6366f1",background:"#6366f120",padding:"1px 5px",borderRadius:6}}>最新</span>}
              </td>
              <td style={{padding:"9px 12px",color:"#fff",fontSize:14,fontWeight:700}}>{r.score}<span style={{color:"#555",fontSize:10,marginLeft:2}}>分</span></td>
              <td style={{padding:"9px 12px",color:"#a5b4fc",fontSize:12}}>第{r.rank}名</td>
              <td style={{padding:"9px 12px"}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{flex:1,height:5,background:"#1a1a30",borderRadius:3,overflow:"hidden"}}>
                    <div style={{width:`${bw}%`,height:"100%",background:latest?"#6366f1":"#2a2a5a",borderRadius:3}}/>
                  </div>
                  <span style={{color:"#555",fontSize:10,minWidth:24}}>{r.score}</span>
                </div>
              </td>
            </tr>;
          })}</tbody>
        </table>
      </div>
      {rows.length>=2&&(()=>{const d=rows[0].score-rows[rows.length-1].score;return(
        <div style={{marginTop:8,padding:"6px 12px",background:"#0c0c1e",border:"1px solid #1a1a30",borderRadius:8,fontSize:12,color:"#888"}}>
          近五年趋势：<span style={{color:d>=0?"#34d399":"#f87171",fontWeight:700}}>{d>=0?"↑":"↓"}{Math.abs(d)}分</span>
          <span style={{marginLeft:8}}>（{rows[rows.length-1].year}年{rows[rows.length-1].score}分 → {rows[0].year}年{rows[0].score}分）</span>
        </div>
      );})()} 
    </div>
  );
}

// ── Stars ──────────────────────────────────────
function Stars({v}){return <span>{[1,2,3,4,5].map(i=><span key={i} style={{color:i<=v?"#f59e0b":"#333",fontSize:14}}>★</span>)} <span style={{color:"#666",fontSize:12}}>{v}/5</span></span>;}

// ── Header ─────────────────────────────────────
function Header({nav,page}){
  const [q,setQ]=useState(""), [res,setRes]=useState([]), [show,setShow]=useState(false);
  const search=v=>{setQ(v);if(!v){setRes([]);setShow(false);return;}const r=SEARCH_IDX.filter(x=>x.name.includes(v)||x.tags.some(t=>t.includes(v))).slice(0,8);setRes(r);setShow(true);};
  return(
    <header style={{background:"#070714",borderBottom:"1px solid #1a1a30",padding:"0 16px",display:"flex",alignItems:"center",gap:14,height:54,position:"sticky",top:0,zIndex:200}}>
      <span onClick={()=>nav("home")} style={{fontWeight:800,fontSize:18,color:"#fff",cursor:"pointer"}}>城探</span>
      <span onClick={()=>nav("cities")} style={{color:page==="cities"?"#6366f1":"#888",cursor:"pointer",fontSize:13}}>排行榜</span>
      <div style={{flex:1,position:"relative",maxWidth:360}}>
        <input value={q} onChange={e=>search(e.target.value)} placeholder="搜索城市、学校、专业…"
          style={{width:"100%",padding:"6px 32px 6px 12px",background:"#111",border:"1px solid #2a2a4a",borderRadius:20,color:"#fff",fontSize:13,outline:"none",boxSizing:"border-box"}}
          onFocus={()=>q&&setShow(true)} onBlur={()=>setTimeout(()=>setShow(false),150)}/>
        <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:"#555",fontSize:13}}>🔍</span>
        {show&&res.length>0&&<div style={{position:"absolute",top:"110%",left:0,right:0,background:"#111",border:"1px solid #2a2a4a",borderRadius:10,overflow:"hidden",zIndex:300}}>
          {res.map(x=><div key={x.id} onMouseDown={()=>{setQ("");setShow("");nav(x.type,x.id);}} style={{padding:"8px 14px",cursor:"pointer",borderBottom:"1px solid #1a1a30",display:"flex",gap:8,alignItems:"center"}}>
            <span>{x.type==="city"?"🏙️":"🎓"}</span>
            <div><div style={{color:"#fff",fontSize:13}}>{x.name}</div><div style={{color:"#666",fontSize:11}}>{x.tags.slice(0,3).join(" · ")}</div></div>
          </div>)}
        </div>}
      </div>
    </header>
  );
}

  const medal=["#f59e0b","#9ca3af","#b45309"];
  return(
    <div style={{background:"#060612",minHeight:"100vh",padding:"36px 16px 60px"}}>
      <div style={{maxWidth:800,margin:"0 auto"}}>
        <div style={{fontSize:10,color:"#6366f1",letterSpacing:5,marginBottom:8}}>RANKING</div>
        <h1 style={{color:"#fff",fontSize:28,fontWeight:900,margin:"0 0 4px"}}>城市排行榜</h1>
        <p style={{color:"#555",marginBottom:24,fontSize:13}}>根据就业竞争力、高校资源、薪资水平综合评估</p>
        <div style={{display:"flex",gap:6,marginBottom:24,background:"#0c0c1e",border:"1px solid #1a1a30",borderRadius:10,padding:4,width:"fit-content"}}>
          {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"6px 16px",background:tab===t.id?"#6366f1":"transparent",border:"none",borderRadius:8,color:tab===t.id?"#fff":"#777",cursor:"pointer",fontSize:12,fontWeight:tab===t.id?700:400}}>{t.label}</button>)}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {RANKS[tab].map((c,i)=>(
            <div key={c.id} onClick={()=>nav("city",c.id)} style={{background:"#0c0c1e",border:"1px solid #1a1a30",borderRadius:12,padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"all 0.2s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="#6366f1";e.currentTarget.style.transform="translateX(4px)";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="#1a1a30";e.currentTarget.style.transform="translateX(0)";}}>
              <div style={{width:34,height:34,borderRadius:"50%",background:i<3?medal[i]+"22":"#111",border:`2px solid ${i<3?medal[i]:"#2a2a4a"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{color:i<3?medal[i]:"#555",fontWeight:700,fontSize:13}}>{i+1}</span>
              </div>
              <div style={{width:50,height:38,borderRadius:7,overflow:"hidden",flexShrink:0}}><Img id={c.id} name={c.name} label={c.name} h={38}/></div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{color:"#fff",fontWeight:700,fontSize:14}}>{c.name}</span>
                  <span style={{color:"#555",fontSize:11}}>{c.province}</span>
                  <span style={{padding:"1px 6px",background:"#111",border:"1px solid #2a2a4a",borderRadius:7,color:"#777",fontSize:9}}>{c.region}</span>
                </div>
                <div style={{display:"flex",gap:12,marginTop:4}}>
                  {[["就业",c.ranks.emp],["高校",c.ranks.uni],["薪资",c.ranks.sal]].map(([k,v])=><span key={k} style={{color:"#555",fontSize:11}}>{k} <span style={{color:"#a5b4fc"}}>#{v}</span></span>)}
                </div>
              </div>
              <span style={{color:"#6366f1",fontSize:16}}>›</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────
function App(){
  const [page,setPage]=useState({type:"home"});
  const nav=(type,id)=>{setPage({type,id});window.scrollTo({top:0,behavior:"smooth"});};
  return(
    <div style={{fontFamily:"'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif"}}>
      <style>{`*{box-sizing:border-box;}body{margin:0;background:#060612;}@keyframes spin{to{transform:rotate(360deg);}}`}</style>
      <Header nav={nav} page={page.type}/>
      {page.type==="home"&&<Home nav={nav}/>}
      {page.type==="city"&&<City id={page.id} nav={nav}/>}
      {page.type==="uni"&&<Uni id={page.id} nav={nav}/>}
      {page.type==="cities"&&<Rankings nav={nav}/>}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
